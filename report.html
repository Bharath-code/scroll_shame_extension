<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollShame - Your Weekly Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #080808;
      --receipt-bg: #0a0a0a;
      --text-primary: #f0f0f0;
      --text-secondary: #666;
      --accent: #ff2d2d;
      --accent-glow: #ff2d2d44;
      --border: #222;
      --receipt-line: #333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-dark);
      color: var(--text-primary);
      width: 100%;
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at 50% 0%, #1a1a1a 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent 0px, transparent 2px, #0a0a0a 2px, #0a0a0a 4px);
    }
    
    .report-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .report-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    /* RECEIPT CARD - The main event */
    .report-card {
      width: 340px;
      background: var(--receipt-bg);
      position: relative;
      box-shadow: 
        0 0 0 1px var(--border),
        0 20px 60px rgba(0, 0, 0, 0.8),
        0 0 100px -20px var(--accent-glow);
      animation: receiptSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes receiptSlideIn {
      from { 
        opacity: 0; 
        transform: translateY(30px) scale(0.95); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }
    
    /* Receipt perforations - top */
    .receipt-top {
      position: absolute;
      top: -12px;
      left: 0;
      right: 0;
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 8px,
        var(--bg-dark) 8px,
        var(--bg-dark) 10px,
        transparent 10px,
        transparent 18px
      );
    }
    
    /* Receipt perforations - bottom */
    .receipt-bottom {
      position: absolute;
      bottom: -12px;
      left: 0;
      right: 0;
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 8px,
        var(--bg-dark) 8px,
        var(--bg-dark) 10px,
        transparent 10px,
        transparent 18px
      );
    }
    
    .card-content {
      padding: 32px 24px;
      border-left: 1px dashed var(--receipt-line);
      border-right: 1px dashed var(--receipt-line);
    }
    
    /* HEADER - Brand */
    .card-header {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 24px;
      position: relative;
    }
    
    .card-header::before {
      content: '★';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--accent);
      font-size: 12px;
    }
    
    .brand-name {
      font-family: 'Archivo Black', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text-primary);
      text-transform: uppercase;
    }
    
    .brand-name span {
      color: var(--accent);
    }
    
    .week-label {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    /* LINE ITEMS - Stats */
    .receipt-items {
      margin-bottom: 24px;
    }
    
    .receipt-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px solid var(--receipt-line);
    }
    
    .item-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .item-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: right;
    }
    
    .item-value.highlight {
      color: var(--accent);
    }
    
    .item-value.small {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    /* ROAST LINES - The roasts */
    .roast-lines {
      padding: 20px 0;
      border-top: 1px solid var(--receipt-line);
      border-bottom: 1px solid var(--receipt-line);
    }
    
    .roast-lines p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 12px;
      padding-left: 12px;
      border-left: 2px solid var(--accent);
      animation: fadeSlideIn 0.4s ease-out backwards;
    }
    
    .roast-lines p:nth-child(1) { animation-delay: 0.1s; }
    .roast-lines p:nth-child(2) { animation-delay: 0.2s; }
    .roast-lines p:nth-child(3) { animation-delay: 0.3s; }
    
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    /* TOTAL - Shame score */
    .shame-total {
      text-align: center;
      padding: 24px 0;
      margin-top: 24px;
    }
    
    .total-label {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .total-score {
      font-family: 'Archivo Black', sans-serif;
      font-size: 72px;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 40px var(--accent-glow);
      animation: scoreReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
    }
    
    @keyframes scoreReveal {
      from { 
        opacity: 0; 
        transform: scale(0.5); 
        filter: blur(10px);
      }
      to { 
        opacity: 1; 
        transform: scale(1); 
        filter: blur(0);
      }
    }
    
    .score-title {
      font-size: 14px;
      color: var(--text-primary);
      margin-top: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }
    
    /* FOOTER */
    .card-footer {
      text-align: center;
      padding-top: 20px;
      border-top: 1px dashed var(--receipt-line);
    }
    
    .card-footer span {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }
    
    .card-footer .tagline {
      display: block;
      margin-top: 8px;
      font-size: 8px;
      color: #444;
    }
    
    /* BUTTON */
    .btn-share {
      padding: 16px 48px;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    
    .btn-share::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--accent);
      transition: left 0.3s ease;
      z-index: -1;
    }
    
    .btn-share:hover {
      color: var(--bg-dark);
    }
    
    .btn-share:hover::before {
      left: 0;
    }
    
    .btn-share:active {
      transform: scale(0.98);
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      color: var(--text-secondary);
      font-size: 12px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/report/main.tsx"></script>
</body>
</html>
