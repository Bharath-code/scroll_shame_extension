<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollShame</title>
  <style>
    :root { --bg-dark: #0d0d0d; --bg-card: #1a1a1a; --text-primary: #f5f5f5; --text-secondary: #888; --accent: #ff4444; --accent-hover: #ff6666; --border: #333; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text-primary); width: 320px; min-height: 400px; }
    .popup-container { padding: 20px; }
    .popup-header { text-align: center; margin-bottom: 24px; }
    .popup-header h1 { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .tagline { font-size: 12px; color: var(--text-secondary); }
    .stats-preview { display: flex; gap: 12px; margin-bottom: 20px; }
    .stat-item { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
    .stat-value { display: block; font-size: 28px; font-weight: 700; color: var(--text-primary); }
    .stat-label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary, .btn-secondary { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--bg-card); }
    .popup-footer { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .popup-footer p { font-size: 11px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/popup/main.tsx"></script>
</body>
</html>
