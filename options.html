<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollShame - Settings</title>
  <style>
    :root { --bg-dark: #0d0d0d; --bg-card: #1a1a1a; --text-primary: #f5f5f5; --text-secondary: #888; --accent: #ff4444; --accent-hover: #ff6666; --border: #333; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text-primary); width: 100%; min-height: 100vh; }
    .options-container { max-width: 500px; margin: 0 auto; padding: 24px; }
    .options-header h1 { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 24px; }
    .settings-section { margin-bottom: 24px; padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
    .settings-section h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .setting-item { margin-bottom: 12px; }
    .setting-item label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
    .setting-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
    .select-input, .text-input { width: 100%; padding: 10px 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 14px; margin-bottom: 8px; }
    .select-input:focus, .text-input:focus { outline: none; border-color: var(--accent); }
    .hint { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
    .actions { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
    .btn-primary, .btn-secondary { padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--bg-card); }
    .saved-msg { color: #44ff44; font-size: 14px; }
    .options-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; }
    .options-footer p { font-size: 12px; color: var(--text-secondary); }
    .privacy-link { color: var(--accent) !important; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/options/main.tsx"></script>
</body>
</html>
