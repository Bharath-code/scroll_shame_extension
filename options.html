<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollShame — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #ff2d2d;
      --yellow: #ffe600;
      --black:  #0a0a0a;
      --dark:   #111;
      --bg:     #141414;
      --card:   #1a1a1a;
      --border: #252525;
      --muted:  #a1a1aa;
      --white:  #f0ede8;
      --mono:   'Space Mono', 'Courier New', monospace;
      --sans:   'Space Grotesk', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .options-container {
      max-width: 540px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .options-header { margin-bottom: 0.5rem; }

    .options-header h1 {
      font-family: var(--mono);
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      letter-spacing: -0.02em;
    }

    .options-header .tagline {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.35rem;
      letter-spacing: 0.06em;
    }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge {
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }
    .badge.free { background: rgba(255,45,45,0.12); color: var(--red); }
    .badge.pro  { background: rgba(255,230,0,0.12); color: var(--yellow); }
    .badge.plus { background: linear-gradient(135deg,rgba(255,45,45,0.2),rgba(255,230,0,0.2)); color: var(--white); }

    /* ── Upgrade Banners ─────────────────────────────────────── */
    .upgrade-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 2px;
      border: 1px solid;
    }
    .upgrade-banner.yellow { border-color: rgba(255,230,0,0.3); background: rgba(255,230,0,0.04); }
    .upgrade-banner.red    { border-color: rgba(255,45,45,0.3);  background: rgba(255,45,45,0.04);  }

    .upgrade-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 0.2rem;
    }
    .upgrade-desc {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .btn-upgrade {
      flex-shrink: 0;
      padding: 0.5rem 1rem;
      background: var(--yellow);
      color: var(--black);
      border: none;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-upgrade:hover { opacity: 0.88; }

    /* ── Settings Sections ───────────────────────────────────── */
    .settings-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .settings-section h2 {
      font-family: var(--mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    /* ── License Input ────────────────────────────────────────── */
    .license-row {
      display: flex;
      gap: 0.5rem;
    }
    .license-input {
      flex: 1;
      padding: 0.65rem 0.75rem;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      transition: border-color 0.15s;
    }
    .license-input:focus {
      outline: none;
      border-color: var(--white);
    }
    .license-input::placeholder { color: var(--muted); }

    .btn-activate {
      padding: 0.65rem 1rem;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-activate:hover {
      border-color: var(--white);
    }

    .hint { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.04em; }
    .hint.error   { color: var(--red); }
    .hint.success { color: #2ecc71; }

    /* ── Voice Selector ──────────────────────────────────────── */
    .voice-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .voice-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.75rem;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .voice-option:hover:not(.locked) {
      border-color: var(--white);
    }
    .voice-option.active {
      border-color: var(--red);
      background: rgba(255,45,45,0.06);
    }
    .voice-option.locked {
      opacity: 0.4;
      cursor: pointer; /* still clickable to trigger upsell */
    }

    .voice-name {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--white);
    }

    .voice-tier-badge {
      font-family: var(--mono);
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.4rem;
      border-radius: 1px;
    }
    .voice-tier-badge.pro      { background: rgba(255,230,0,0.1); color: var(--yellow); }
    .voice-tier-badge.pro-plus { background: rgba(255,45,45,0.1);  color: var(--red);    }

    .voice-active-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    /* ── Toggle Switches ─────────────────────────────────────── */
    .setting-item {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }
    .setting-item:last-child { border-bottom: none; padding-bottom: 0; }

    .toggle-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--white);
      cursor: pointer;
    }

    .toggle {
      width: 36px; height: 20px;
      background: var(--border);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--red); }

    .toggle-thumb {
      width: 14px; height: 14px;
      background: var(--white);
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: transform 0.2s ease;
    }
    .toggle.on .toggle-thumb { transform: translateX(16px); }

    /* ── Actions ─────────────────────────────────────────────── */
    .actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-primary {
      padding: 0.75rem 1.5rem;
      background: var(--red);
      border: none;
      border-radius: 2px;
      color: #fff;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #cc1e1e; }

    .saved-msg {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #2ecc71;
      letter-spacing: 0.04em;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .options-footer {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .options-footer p {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Discovery Lab (TASK-21) ──────────────────────────────── */
    .discovery-lab {
      background: rgba(0, 119, 181, 0.05);
      border: 1px solid rgba(0, 119, 181, 0.2);
    }

    .discovery-lab h2 {
      color: #0077b5;
    }

    .discovery-stats {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin: 0.5rem 0;
    }

    .stat-group h3 {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }

    .bar-container {
      width: 100%;
      height: 24px;
      background: var(--dark);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      border: 1px solid var(--border);
    }

    .bar { height: 100%; transition: width 0.6s ease; }
    .bar.hit  { background: #2ecc71; }
    .bar.miss { background: var(--red); }

    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .feature-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .feature-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--white);
    }

    .feature-bar-bg {
      width: 100%;
      height: 6px;
      background: var(--dark);
      border-radius: 3px;
    }

    .feature-bar-fill {
      height: 100%;
      background: #0077b5;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .btn-submit-lab {
      width: 100%;
      padding: 0.75rem;
      background: #0077b5;
      border: none;
      border-radius: 2px;
      color: #fff;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn-submit-lab:disabled { opacity: 0.5; cursor: wait; }

    .pmf-health-badge {
      font-family: var(--mono);
      font-size: 0.5rem;
      padding: 0.15rem 0.4rem;
      border-radius: 1px;
      letter-spacing: 0.05em;
    }
    .pmf-health-badge.healthy { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
    .pmf-health-badge.at-risk { background: rgba(255, 45, 45, 0.1); color: var(--red); }

    .pmf-gauge-container {
      width: 100%;
      height: 12px;
      background: var(--dark);
      border-radius: 6px;
      position: relative;
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .pmf-gauge-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red) 0%, var(--yellow) 40%, #2ecc71 100%);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pmf-target-line {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
      z-index: 2;
    }

    .hint.warning {
      color: var(--yellow);
      margin-top: 0.75rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/options/main.tsx"></script>
</body>
</html>
